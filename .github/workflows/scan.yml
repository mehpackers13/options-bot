name: Options Scan

# Runs every 15 minutes during market hours — no Mac needed.
# UTC 13:00-21:00 covers 9:30am-4pm ET in summer (EDT) and winter (EST).
# run_once.py skips the run automatically if the market is closed.

on:
  schedule:
    - cron: "*/15 13-21 * * 1-5"   # Mon–Fri, every 15 min, 1pm–9pm UTC
  workflow_dispatch:                  # Manual trigger from GitHub → Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan (single pass)
        env:
          DISCORD_WEBHOOK_URL:        ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_HEALTH_WEBHOOK_URL: ${{ secrets.DISCORD_HEALTH_WEBHOOK_URL }}
          ROBINHOOD_USERNAME:         ${{ secrets.ROBINHOOD_USERNAME }}
          ROBINHOOD_PASSWORD:         ${{ secrets.ROBINHOOD_PASSWORD }}
        run: python run_once.py

      - name: Regenerate dashboard data
        run: python generate_data.py

      - name: Commit updated data files
        run: |
          git config user.name  "options-bot[actions]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add alerts_log.csv bot.log data/ docs/data.json 2>/dev/null || true
          git diff --staged --quiet \
            || git commit -m "📊 scan $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
