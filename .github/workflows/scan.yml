name: Options Scan

# Runs every 15 minutes during market hours — no Mac needed.
# UTC 13:00-21:00 covers 9:30am-4pm ET in summer (EDT) and winter (EST).
# run_once.py skips the run automatically if the market is closed.

on:
  schedule:
    - cron: "*/15 13-21 * * 1-5"   # Mon–Fri, every 15 min, 1pm–9pm UTC
  workflow_dispatch:                  # Manual trigger from GitHub → Actions tab

# Shared lock across ALL options-bot workflows — only one runs at a time.
concurrency:
  group: options-git
  cancel-in-progress: false

permissions:
  contents: write

jobs:

  # ── Job 1: Run the scan. No git operations here. ─────────────────────────
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan (single pass)
        env:
          DISCORD_WEBHOOK_URL:        ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_HEALTH_WEBHOOK_URL: ${{ secrets.DISCORD_HEALTH_WEBHOOK_URL }}
          TRADIER_API_TOKEN:          ${{ secrets.TRADIER_API_TOKEN }}
        run: python run_once.py

      - name: Regenerate dashboard data
        run: python generate_data.py

      - name: Upload outputs for commit job
        uses: actions/upload-artifact@v4
        with:
          name: scan-data-${{ github.run_id }}
          path: |
            alerts_log.csv
            bot.log
            data/
            docs/data.json
          if-no-files-found: ignore
          retention-days: 1

  # ── Job 2: Fresh checkout → apply outputs → single atomic commit. ─────────
  commit:
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Self-heal git state
        run: |
          rm -f .git/index.lock .git/MERGE_HEAD .git/rebase-merge/head-name 2>/dev/null || true
          git rebase --abort 2>/dev/null || true
          git checkout -- . 2>/dev/null || true

      - name: Download scan outputs
        uses: actions/download-artifact@v4
        with:
          name: scan-data-${{ github.run_id }}
          path: .

      - name: Commit and push
        run: |
          git config user.name  "options-bot[actions]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add alerts_log.csv bot.log data/ docs/data.json 2>/dev/null || true
          git diff --staged --quiet && echo "Nothing to commit." && exit 0
          git commit -m "📊 scan $(date -u '+%Y-%m-%d %H:%M UTC')"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase -X ours origin/main && git push && break
            echo "Push attempt $attempt failed — retrying in 15s..."
            git rebase --abort 2>/dev/null || true
            git checkout -- . 2>/dev/null || true
            sleep 15
          done
