name: Morning Self-Improvement

# Runs at 8am ET on weekdays.
# 8am EDT (summer, UTC-4) = 12:00 UTC
# 8am EST (winter, UTC-5) = 13:00 UTC

on:
  schedule:
    - cron: "0 12 * * 1-5"   # 8am EDT (Apr–Oct)
    - cron: "0 13 * * 1-5"   # 8am EST (Nov–Mar)
  workflow_dispatch:

# Shared lock across ALL options-bot workflows — only one runs at a time.
concurrency:
  group: options-git
  cancel-in-progress: false

permissions:
  contents: write

jobs:

  # ── Job 1: Run morning analysis. No git operations here. ──────────────────
  self-improve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning analysis (stats + AI brain + Discord briefing)
        env:
          DISCORD_WEBHOOK_URL:        ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_HEALTH_WEBHOOK_URL: ${{ secrets.DISCORD_HEALTH_WEBHOOK_URL }}
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_morning.py

      - name: Regenerate dashboard data
        run: python generate_data.py

      - name: Upload outputs for commit job
        uses: actions/upload-artifact@v4
        with:
          name: morning-data-${{ github.run_id }}
          path: |
            bot.log
            threshold_changes.log
            ai_brain.log
            data/
            docs/data.json
          if-no-files-found: ignore
          retention-days: 1

  # ── Job 2: Fresh checkout → apply outputs → single atomic commit. ─────────
  commit:
    needs: self-improve
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Self-heal git state
        run: |
          rm -f .git/index.lock .git/MERGE_HEAD .git/rebase-merge/head-name 2>/dev/null || true
          git rebase --abort 2>/dev/null || true
          git checkout -- . 2>/dev/null || true

      - name: Download morning outputs
        uses: actions/download-artifact@v4
        with:
          name: morning-data-${{ github.run_id }}
          path: .

      - name: Commit and push
        run: |
          git config user.name  "options-bot[actions]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bot.log threshold_changes.log ai_brain.log data/ docs/data.json 2>/dev/null || true
          git diff --staged --quiet && echo "Nothing to commit." && exit 0
          git commit -m "🧠 morning-analysis $(date -u '+%Y-%m-%d %H:%M UTC')"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase -X ours origin/main && git push && break
            echo "Push attempt $attempt failed — retrying in 15s..."
            git rebase --abort 2>/dev/null || true
            git checkout -- . 2>/dev/null || true
            sleep 15
          done
