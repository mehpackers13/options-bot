name: Weekly Report

# Runs Sunday at 8pm ET
# 8pm EDT (summer, UTC-4) = 00:00 Monday UTC
# 8pm EST (winter, UTC-5) = 01:00 Monday UTC

on:
  schedule:
    - cron: "0 0 * * 1"    # 8pm EDT (Apr–Oct) — Monday 00:00 UTC
    - cron: "0 1 * * 1"    # 8pm EST (Nov–Mar) — Monday 01:00 UTC
  workflow_dispatch:         # Manual trigger from Actions tab

# Shared lock across ALL options-bot workflows — only one runs at a time.
concurrency:
  group: options-git
  cancel-in-progress: false

permissions:
  contents: write

jobs:

  # ── Job 1: Run weekly report. No git operations here. ─────────────────────
  weekly-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly report
        env:
          DISCORD_HEALTH_WEBHOOK_URL: ${{ secrets.DISCORD_HEALTH_WEBHOOK_URL }}
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_weekly.py

      - name: Regenerate dashboard data
        run: python generate_data.py

      - name: Upload outputs for commit job
        uses: actions/upload-artifact@v4
        with:
          name: weekly-data-${{ github.run_id }}
          path: |
            data/ai_weekly.json
            docs/data.json
          if-no-files-found: ignore
          retention-days: 1

  # ── Job 2: Fresh checkout → apply outputs → single atomic commit. ─────────
  commit:
    needs: weekly-report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Self-heal git state
        run: |
          rm -f .git/index.lock .git/MERGE_HEAD .git/rebase-merge/head-name 2>/dev/null || true
          git rebase --abort 2>/dev/null || true
          git checkout -- . 2>/dev/null || true

      - name: Download weekly outputs
        uses: actions/download-artifact@v4
        with:
          name: weekly-data-${{ github.run_id }}
          path: .

      - name: Commit and push
        run: |
          git config user.name  "options-bot[actions]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ai_weekly.json docs/data.json 2>/dev/null || true
          git diff --staged --quiet && echo "Nothing to commit." && exit 0
          git commit -m "📅 weekly-report $(date -u '+%Y-%m-%d')"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase -X ours origin/main && git push && break
            echo "Push attempt $attempt failed — retrying in 15s..."
            git rebase --abort 2>/dev/null || true
            git checkout -- . 2>/dev/null || true
            sleep 15
          done
