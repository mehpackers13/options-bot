name: Weekly Report

# Runs Sunday at 8pm ET
# 8pm EDT (summer, UTC-4) = 00:00 Monday UTC
# 8pm EST (winter, UTC-5) = 01:00 Monday UTC

on:
  schedule:
    - cron: "0 0 * * 1"    # 8pm EDT (Apr–Oct) — Monday 00:00 UTC
    - cron: "0 1 * * 1"    # 8pm EST (Nov–Mar) — Monday 01:00 UTC
  workflow_dispatch:         # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly report
        env:
          DISCORD_HEALTH_WEBHOOK_URL: ${{ secrets.DISCORD_HEALTH_WEBHOOK_URL }}
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_weekly.py

      - name: Regenerate dashboard data
        run: python generate_data.py

      - name: Commit updated data
        run: |
          git config user.name  "options-bot[actions]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ai_weekly.json docs/data.json 2>/dev/null || true
          git diff --staged --quiet \
            || git commit -m "📅 weekly-report $(date -u '+%Y-%m-%d')"
          git push
